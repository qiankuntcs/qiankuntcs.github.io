            - text: I am currently an Associate Professor at the School of Cyber Science and Engineering (CSE) at Huazhong University of Science and Technology (HUST). Prior to joining HUST, I obtained my Ph.D. from the University of Hong Kong (HKU) in 2021, under the supervision of
            - link "Zhiyi Huang" [ref=e43] [cursor=pointer]:
              - /url: https://i.cs.hku.hk/~zhiyi/
            - text: ", where I received the Lee Shau Kee Postgraduate Fellowship and the Y S & Christabel Lung Postgraduate Scholarship. Before that, I obtained my B.E. from the Chu Kochen Honors College at Zhejiang University (ZJU) in 2017, where I was awarded the Dean's Scholarship. I have also been selected for Overseas High-level Talents in Hubei Province, Wuhan Young Talents, East Lake Young Talents, and the CCF-DiDi GAIA Scholars program."
